<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 LION_LIVE - منصة البث الذكية</title>
    <style>
        /* تصميم احترافي مستوحى من تطبيقات البث العالمية */
        body { 
            background-color: #0b0e14; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
        }
        
        header {
            background: #161b22;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #f1c40f;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: #f1c40f;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container {
            max-width: 950px;
            margin: 20px auto;
            padding: 10px;
        }

        .status-bar {
            background: #1f242c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-right: 4px solid #00ff88;
            display: flex;
            justify-content: space-between;
        }

        /* حاوية السكريبت الذكي */
        .match-box {
            background: #161b22;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #30363d;
            min-height: 600px; /* لضمان ثبات المساحة أثناء التحميل */
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🦁 LION_LIVE 🦁</div>
    </header>

    <div class="container">
        <div class="status-bar">
            <span>النظام: متصل وتلقائي ✅</span>
            <span>الموقع: الجزائر 🇩🇿</span>
        </div>

        <div class="match-box">
            <script src="https://stream2watch.tv/widgets/game-finder.js"></script>
        </div>
    </div>

    <footer>
        جميع الحقوق محفوظة لمنصة LION_LIVE &copy; 2026
    </footer>

</body>
</html>
