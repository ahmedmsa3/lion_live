<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 LION_LIVE - البث المباشر</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0b0d10; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #161b22; padding: 20px; text-align: center; border-bottom: 4px solid #f1c40f; }
        .logo { font-size: 32px; color: #f1c40f; font-weight: bold; letter-spacing: 2px; }
        
        .main-container { max-width: 900px; margin: 20px auto; padding: 15px; }
        
        /* مشغل الفيديو الفخم */
        .video-box { 
            width: 100%; background: #000; border-radius: 15px; 
            overflow: hidden; border: 2px solid #30363d; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        /* شبكة أزرار القنوات - شكل تطبيقات */
        .channel-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 15px; 
        }
        .chan-btn { 
            background: #1c2128; border: 1px solid #444; color: #00ff88; 
            padding: 20px 10px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .chan-btn:hover { background: #00ff88; color: #000; transform: translateY(-3px); }
        .active { background: #00ff88 !important; color: #000 !important; }

        .live-tag { background: red; color: white; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<header>
    <div class="logo">🦁 LION_LIVE 🦁</div>
</header>

<div class="main-container">
    <div class="video-box">
        <video id="lion-player" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto">
            <source src="" type="application/x-mpegURL">
        </video>
    </div>

    <div class="channel-grid">
        <button class="chan-btn" onclick="playChan('https://raw.githubusercontent.com/mohammadS96/IPTV/master/beIN_Sports_1.m3u8', this)">
            <span class="live-tag">LIVE</span><br>beIN Sports 1
        </button>
        <button class="chan-btn" onclick="playChan('https://raw.githubusercontent.com/mohammadS96/IPTV/master/beIN_Sports_2.m3u8', this)">
            <span class="live-tag">LIVE</span><br>beIN Sports 2
        </button>
        <button class="chan-btn" onclick="playChan('https://raw.githubusercontent.com/mohammadS96/IPTV/master/beIN_Sports_3.m3u8', this)">
            <span class="live-tag">LIVE</span><br>beIN Sports 3
        </button>
        <button class="chan-btn" onclick="playChan('https://raw.githubusercontent.com/mohammadS96/IPTV/master/SSC_1.m3u8', this)">
            <span class="live-tag">LIVE</span><br>SSC 1
        </button>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    var player = videojs('lion-player');

    function playChan(url, btn) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
        
        // تمييز الزر
        document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>

</body>
</html>
